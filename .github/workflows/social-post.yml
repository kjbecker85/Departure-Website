name: Daily Social Media Post

on:
  schedule:
    # Run daily at 10:03 AM EST (14:03 UTC)
    - cron: '3 14 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (preview only)'
        required: false
        type: boolean
        default: false
      only_platforms:
        description: 'Comma-separated platforms to post to (x, ig, fb). Leave empty for all.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install dotenv twitter-api-v2 @supabase/supabase-js

      - name: Post to social media
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          DRY_ARG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_ARG="--dry-run"
          fi
          PLATFORMS_ARG=""
          if [ -n "${{ github.event.inputs.only_platforms }}" ]; then
            PLATFORMS_ARG="--only-platforms ${{ github.event.inputs.only_platforms }}"
          fi
          node scripts/post-daily.cjs $DATE_ARG $DRY_ARG $PLATFORMS_ARG
